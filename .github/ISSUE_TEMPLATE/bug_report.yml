name: Bug report / 错误报告
description: Create a report to help us improve KernelSU / 创建报告以帮助我们改进 KernelSU
labels: [bug]

body:
  - type: checkboxes
    attributes:
      label: Please check before submitting an issue / 提交 Issue 前请确认
      options:
        - label: I have read the documents, and haven't found anything relevant / 我已阅读文档，且未找到相关内容
          required: true
        - label: I surely I'm using the latest CI manager which is from main branch / 我确定我使用的是来自 main 分支的最新 CI 管理器
          required: true
        - label: I have searched the issues and haven't found anything relevant / 我已搜索过 Issue 且未找到相关内容
          required: true
        - label: I will upload bugreport file in KernelSU Manager - Settings - Report log / 我将在 KernelSU 管理器 - 设置 - 报告日志 中上传 bugreport 文件
          required: true
        - label: I know how to reproduce the issue which may not be specific to my device / 我知道如何复现该问题，且该问题可能不局限于我的设备
          required: false

  - type: dropdown
    id: kernel_category
    attributes:
      label: Kernel Version Category / 内核版本分类
      options:
        - "5.10+"
        - "5.10-"
    validations:
      required: true

  - type: dropdown
    id: is_lkm
    attributes:
      label: Using LKM Mode? / 是否使用 LKM 模式？
      options:
        - "Yes / 是"
        - "No / 否"
    validations:
      required: true

  - type: dropdown
    id: hook_type
    attributes:
      label: Hook Type / Hook 类型
      description: If you selected "Yes" for LKM Mode above, please select "tracepoint". / 如果上面选择了 LKM 模式，请在此处选择 "tracepoint"。
      options:
        - "tracepoint"
        - "susfs"
        - "manual"
    validations:
      required: true

  - type: textarea
    attributes:
      label: Describe the bug / 描述 Bug
      description: A clear and concise description of what the bug is. / 清晰明了地描述这个 Bug 是什么。
    validations:
      required: true

  - type: textarea
    attributes:
      label: To Reproduce / 复现步骤
      description: Steps to reproduce the behaviour. / 复现该行为的具体步骤。
      placeholder: |
        - 1. Go to '...'
        - 2. Click on '....'
        - 3. Scroll down to '....'
        - 4. See error

  - type: textarea
    attributes:
      label: Expected behavior / 期望行为
      description: A clear and concise description of what you expected to happen. / 清晰明了地描述你期望发生的情况。

  - type: textarea
    attributes:
      label: Screenshots / 屏幕截图
      description: If applicable, add screenshots to help explain your problem. / 如果适用，请添加屏幕截图以帮助解释你的问题。

  - type: textarea
    attributes:
      label: Logs / 日志
      description: If applicable, add crash or any other logs to help us figure out the problem. / 如果适用，请添加崩溃日志或其他日志以帮助我们找出问题。

  - type: textarea
    attributes:
      label: Device info / 设备信息
      value: |
        - Device / 设备:
        - OS Version / 系统版本:
        - KernelSU Version / KernelSU 版本:
        - Kernel Version / 内核版本:
    validations:
      required: true

  - type: textarea
    attributes:
      label: Additional context / 额外信息
      description: Add any other context about the problem here. / 在此处添加有关该问题的任何其他内容。
